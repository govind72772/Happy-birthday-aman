<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Aman 🎉</title>

<style>
body{
margin:0;
height:100vh;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* PARTICLES */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background-image:
radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
animation:move 25s linear infinite;
opacity:0.25;
}

@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(-500px);}
}

/* GLASS CARD */
.card{
backdrop-filter:blur(18px);
background:rgba(255,255,255,0.1);
border-radius:25px;
padding:30px;
width:90%;
max-width:420px;
text-align:center;
box-shadow:0 0 40px rgba(255,255,255,0.2);
animation:fade 2s ease;
}

@keyframes fade{
from{opacity:0;transform:scale(.8);}
to{opacity:1;transform:scale(1);}
}

img.profile{
width:200px;
border-radius:20px;
margin:15px 0;
box-shadow:0 0 20px pink;
}

.sayari{
margin-top:15px;
font-size:17px;
line-height:1.6;
color:#ffe6ff;
}

/* CONFETTI */
.confetti span{
position:absolute;
width:8px;
height:8px;
background:white;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px);}
100%{transform:translateY(100vh);}
}
</style>
</head>

<body>

<!-- 🎵 AUTO SONG -->
<audio id="bgmusic" autoplay loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="confetti">
<span style="left:10%"></span>
<span style="left:25%"></span>
<span style="left:40%"></span>
<span style="left:60%"></span>
<span style="left:75%"></span>
<span style="left:90%"></span>
</div>

<div class="card">

<h1>🎉 Happy Birthday Aman 🎂</h1>

<img src="picture 1.jpg" class="profile">

<div class="sayari">
✨ Dost wo nahi jo sirf saath rahe,<br>
Dost wo hai jo har situation me stand rahe 💫<br><br>

Zindagi ke har level pe tu mera support bana rahe,<br>
Aur bhai Aman tu hamesha khush rahe ❤️<br><br>

Happy Birthday mere true dost 🎈
</div>

</div>

<script>
/* Force play after user click navigation */
window.onload = function(){
let music = document.getElementById("bgmusic");
music.play().catch(()=>{});
}
</script>

</body>
</html>
