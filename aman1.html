<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Special Gift For Aman 🎁</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Poppins;
background:linear-gradient(135deg,#141e30,#243b55);
overflow:hidden;
color:white;
}

/* PARTICLES */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background-image:
radial-gradient(white 1px, transparent 1px);
background-size:35px 35px;
animation:move 30s linear infinite;
opacity:0.25;
}

@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(-600px);}
}

/* GLASS BOX */
.container{
text-align:center;
padding:40px;
border-radius:25px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(18px);
box-shadow:0 0 40px rgba(255,255,255,0.2);
animation:fade 2s ease;
}

@keyframes fade{
from{opacity:0;transform:scale(.7);}
to{opacity:1;transform:scale(1);}
}

h1{
margin-bottom:20px;
}

/* GIFT */
.gift{
font-size:90px;
cursor:pointer;
animation:float 2.5s infinite ease-in-out;
transition:.3s;
}

.gift:hover{
transform:scale(1.2) rotate(10deg);
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0);}
}

/* BUTTON */
button{
margin-top:20px;
padding:12px 30px;
border:none;
border-radius:30px;
font-size:18px;
background:linear-gradient(45deg,#ff4e50,#fc913a);
color:white;
cursor:pointer;
transition:.4s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px pink;
}

</style>
</head>

<body>

<div class="container">

<h1>🎉 Aman Ke Liye Ek Special Gift 🎁</h1>

<div class="gift">🎁</div>

<p>Click karo aur apna surprise open karo ✨</p>

<button onclick="openGift()">OPEN GIFT</button>

</div>

<script>
function openGift(){
window.location.href="aman.html";
}
</script>

</body>
</html>
